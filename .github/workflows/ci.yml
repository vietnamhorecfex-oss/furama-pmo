name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: furama
          POSTGRES_PASSWORD: furama
          POSTGRES_DB: furama_pmo
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U furama"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://furama:furama@localhost:5432/furama_pmo?schema=public
      JWT_ACCESS_SECRET: ci-test-secret-key-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @furama/shared build
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
