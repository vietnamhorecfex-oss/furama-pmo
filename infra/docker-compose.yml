# Local dev infra. App services (backend/web) run via pnpm dev; uncomment to containerize.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: furama
      POSTGRES_PASSWORD: furama
      POSTGRES_DB: furama_pmo
    # Host 5432 is often taken by a native Postgres; publish on 5433 to avoid the clash.
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furama"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7
    # Host 6379 is often taken by a native Redis; publish on 6380 to avoid the clash.
    ports: ["6380:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]
volumes:
  pgdata: {}
  redisdata: {}
